services:
  nginx:
    ports:
      - '8080:80'
    volumes:
      - ./infra/nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - appnet
    environment:
      POSTGRES_PASSWORD: pitchme
      POSTGRES_DB: pitchme
    env_file:
      - .env

volumes:
  postgres-data:

networks:
  appnet:
    driver: bridge
