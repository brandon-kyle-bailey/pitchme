services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - 6378:6379
    volumes:
      - redis-data:/data
    networks:
      - appnet

  api:
    build:
      context: .
      dockerfile: infra/dockerfiles/api.Dockerfile
    container_name: pitch-me
    restart: unless-stopped
    depends_on:
      - redis
    expose:
      - '8080'
    env_file:
      - .env
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./infra/nginx/nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    depends_on:
      - api
    networks:
      - appnet

  certbot:
    image: certbot/certbot
    container_name: certbot
    depends_on:
      - nginx
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :;
             do certbot renew;
             sleep 12h & wait $${!};
             done"

networks:
  appnet:
    driver: bridge

volumes:
  redis-data:
  certbot-www:
  certbot-conf:
